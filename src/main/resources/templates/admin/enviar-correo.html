<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enviar Correo</title>
    <!-- Bootstrap y FontAwesome desde CDN -->

    <link rel="stylesheet" th:href="@{/CSS/navbar.css}" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background: url('/IMG/fondo.jpg') no-repeat center/cover;">

<!-- Navbar -->
<div th:replace="~{plantilla/navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-success text-white">
            <h4><i class="fas fa-envelope"></i> Enviar Correo</h4>
        </div>
        <div class="card-body">
            <form id="correoForm">
                <!-- Tipo de envío -->
                <div class="mb-3">
                    <label for="tipoEnvio" class="form-label">Tipo de envío *</label>
                    <select id="tipoEnvio" class="form-select" required onchange="toggleCampos()">
                        <option value="texto">Texto plano individual</option>
                        <option value="masivoTexto">Texto plano masivo</option>
                        <option value="html">HTML individual</option>
                        <option value="masivoHtml">HTML masivo</option>
                        <option value="bienvenida">Plantilla bienvenida</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="destinatario" class="form-label">Destinatario(s) *</label>
                    <input type="text" id="destinatario" class="form-control"
                           placeholder="ejemplo@correo.com o varios separados por coma" required />
                </div>

                <div id="camposNormales">
                    <div class="mb-3">
                        <label for="asunto" class="form-label">Asunto *</label>
                        <input type="text" id="asunto" class="form-control" placeholder="Asunto del correo" />
                    </div>

                    <div class="mb-3">
                        <label for="mensaje" class="form-label">Mensaje / HTML *</label>
                        <textarea id="mensaje" class="form-control" rows="6"
                                  placeholder="Escribe tu mensaje o código HTML..."></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="button" class="btn btn-success" onclick="enviarCorreo()">
                        <i class="fas fa-paper-plane"></i> Enviar
                    </button>
                    <a th:href="@{/admin/lista}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleCampos() {
        const tipo = document.getElementById("tipoEnvio").value;
        const campos = document.getElementById("camposNormales");
        if (tipo === "bienvenida") {
            campos.style.display = "none"; // ocultar asunto y mensaje
        } else {
            campos.style.display = "block"; // mostrar asunto y mensaje
        }
    }

    function enviarCorreo() {
        const tipo = document.getElementById("tipoEnvio").value;
        const destinatarios = document.getElementById("destinatario").value.split(",");
        const asunto = document.getElementById("asunto").value;
        const mensaje = document.getElementById("mensaje").value;

        let url = "";
        let payload = {};

        switch (tipo) {
            case "texto":
            case "masivoTexto":
                url = "/api/correos/masivo/texto";
                payload = { destinatarios, asunto, contenido: mensaje };
                break;
            case "html":
            case "masivoHtml":
                url = "/api/correos/masivo/html";
                payload = { destinatarios, asunto, contenidoHtml: mensaje };
                break;
            case "bienvenida":
                url = "/api/correos/bienvenida?destinatario=" + destinatarios[0];
                payload = null;
                break;
        }

        fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: payload ? JSON.stringify(payload) : null
        })
        .then(r => r.text())
        .then(msg => alert(msg))
        .catch(err => alert("Error al enviar correo: " + err));
    }
</script>

</body>
</html>
