<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reporte Estadístico</title>
    <link rel="stylesheet" th:href="@{/CSS/navbar.css}" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background: url('/IMG/fondo.jpg') no-repeat center/cover;">

<div th:replace="~{plantilla/navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4><i class="fas fa-file-pdf"></i> Generar Reporte Estadístico</h4>
        </div>
        <div class="card-body text-center">
            <p>Haz clic en el botón para generar el reporte en PDF usando JasperReports.</p>

            <button type="button" class="btn btn-danger" onclick="generarReporte()" id="btnReporte">
                <i class="fas fa-download"></i> Descargar PDF
            </button>

            <div id="errorMsg" class="alert alert-danger mt-3 d-none"></div>
        </div>
    </div>
</div>

<script>
    function generarReporte() {
        const btn = document.getElementById("btnReporte");
        const errorMsg = document.getElementById("errorMsg");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generando...';
        errorMsg.classList.add("d-none");

        fetch("/api/reportes/jasper/estadistico")
            .then(response => {

                if (!response.ok) {
                    return response.json().then(err => {
                        throw new Error(err.error || "Error " + response.status);
                    });
                }

            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = "reporte-estadistico.pdf";
                link.click();
                URL.revokeObjectURL(url);
            })
            .catch(err => {
                errorMsg.textContent = "Error al generar reporte: " + err.message;
                errorMsg.classList.remove("d-none");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-download"></i> Descargar PDF';
            });
    }
</script>

</body>
</html>
