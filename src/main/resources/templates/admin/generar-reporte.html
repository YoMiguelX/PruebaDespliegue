<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reporte Estadístico</title>
    <!-- Bootstrap y FontAwesome desde CDN -->

    <link rel="stylesheet" th:href="@{/CSS/navbar.css}" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body style="background: url('/IMG/fondo.jpg') no-repeat center/cover;">

<!-- Navbar -->
<div th:replace="~{plantilla/navbar :: navbar}"></div>

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h4><i class="fas fa-file-pdf"></i> Generar Reporte Estadístico</h4>
        </div>
        <div class="card-body text-center">
            <p>Haz clic en el botón para generar el reporte en PDF usando JasperReports.</p>
            <button type="button" class="btn btn-danger" onclick="generarReporte()">
                <i class="fas fa-download"></i> Descargar PDF
            </button>
        </div>
    </div>
</div>

<script>
    function generarReporte() {
        fetch("/api/reportes/jasper/estadistico")
            .then(r => r.json())
            .then(data => {
                // Convertir base64 a Blob PDF
                const byteCharacters = atob(data.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], { type: "application/pdf" });

                // Crear enlace de descarga
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = data.nombre || "reporte.pdf";
                link.click();
            })
            .catch(err => alert("Error al generar reporte: " + err));
    }
</script>

</body>
</html>
