<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<body class="bg-gray-50 min-h-screen flex flex-col">

<!-- Encabezado -->
<header class="bg-gray-900 text-white py-5 px-8 flex items-center justify-between shadow">
    <div class="flex items-center gap-4">
        <button onclick="window.location.href='/usuario/perfil'"
                class="text-gray-400 hover:text-white transition text-sm flex items-center gap-1">
            ← Inicio
        </button>
        <h1 class="text-2xl font-bold">Catálogo de Cursos</h1>
    </div>
    <div class="flex items-center gap-3">
        <span class="text-sm text-gray-300" th:text="'Hola, ' + ${session.usuarioNombre}">Hola, Usuario</span>
        <button onclick="window.location.href='/usuario/perfil'"
                class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded text-white text-sm font-medium transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            Mi Perfil
        </button>
    </div>
</header>

<!-- Barra de herramientas: filtro + botón Open Trivia -->
<nav class="bg-white border-b border-gray-200 px-8 py-4 flex flex-wrap items-center justify-between gap-4">
    <!-- Filtro por categoría (JavaScript-based) -->
    <div class="flex items-center gap-3 flex-wrap">
        <span class="text-sm font-medium text-gray-600">Filtrar por categoría:</span>
        <div class="flex flex-wrap gap-2" id="filtros">
            <button data-filtro="todos"
                    onclick="filtrar('todos')"
                    class="filtro-btn activo px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-900 text-white transition">
                Todos
            </button>
            <button data-filtro="exactas"
                    onclick="filtrar('exactas')"
                    class="filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Ciencias exactas
            </button>
            <button data-filtro="naturales"
                    onclick="filtrar('naturales')"
                    class="filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Ciencias naturales
            </button>
            <button data-filtro="sociales"
                    onclick="filtrar('sociales')"
                    class="filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Ciencias sociales
            </button>
            <button data-filtro="tecnologia"
                    onclick="filtrar('tecnologia')"
                    class="filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Tecnología
            </button>
            <button data-filtro="idiomas"
                    onclick="filtrar('idiomas')"
                    class="filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Idiomas
            </button>
            <button data-filtro="otros"
                    onclick="filtrar('otros')"
                    class="filtro-btn px-3 py-1.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-700 hover:bg-gray-200 transition">
                Otros
            </button>
        </div>
    </div>

    <!-- Botón Open Trivia -->
    <button onclick="window.location.href='/open-trivia'"
            class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-semibold shadow transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Trivia Global (Open Trivia)
    </button>
</nav>

</main>

<script>
    // ── Filtro por categoría ──────────────────────────────────────────────────
    function filtrar(categoria) {
        const tarjetas = document.querySelectorAll('.curso-card');
        const botones  = document.querySelectorAll('.filtro-btn');
        let visibles   = 0;

        tarjetas.forEach(card => {
            const cat     = card.getAttribute('data-categoria');
            const mostrar = categoria === 'todos' || cat === categoria;
            card.style.display = mostrar ? '' : 'none';
            if (mostrar) visibles++;
        });

        botones.forEach(btn => {
            const isActivo = btn.getAttribute('data-filtro') === categoria;
            btn.classList.toggle('bg-gray-900', isActivo);
            btn.classList.toggle('text-white', isActivo);
            btn.classList.toggle('bg-gray-100', !isActivo);
            btn.classList.toggle('text-gray-700', !isActivo);
            btn.classList.toggle('hover:bg-gray-200', !isActivo);
        });

        document.getElementById('sin-resultados').classList.toggle('hidden', visibles > 0);
    }

    // ── Mostrar estado de completado por curso ────────────────────────────────
    // Cada curso tiene su propia clave localStorage (progreso_matematicas, etc.)
    // y 9 lecciones. Se lee al cargar la página.
    const TOTAL_LECCIONES = 9;

    function calcularPorcentaje(lsKey) {
        try {
            const data = JSON.parse(localStorage.getItem(lsKey)) || {};
            const completadas = Object.keys(data).length;
            return Math.min(Math.round((completadas / TOTAL_LECCIONES) * 100), 100);
        } catch (e) { return 0; }
    }

    function aplicarEstadoCursos() {
        document.querySelectorAll('.curso-card[data-lskey]').forEach(card => {
            const lsKey    = card.getAttribute('data-lskey');
            const cert     = card.getAttribute('data-cert');
            const pct      = calcularPorcentaje(lsKey);
            const completo = pct === 100;

            // Barra de progreso mini en la tarjeta
            const barraWrap = card.querySelector('.mini-progress');
            if (barraWrap) {
                barraWrap.querySelector('.mini-bar').style.width = pct + '%';
                barraWrap.querySelector('.mini-pct').textContent = pct + '%';
            }

            // Badge de completado
            const badge = card.querySelector('.badge-completado');
            if (badge) {
                badge.classList.toggle('hidden', !completo);
            }

            // Botón de certificado (solo si completado)
            const certBtn = card.querySelector('.cert-btn');
            if (certBtn) {
                certBtn.classList.toggle('hidden', !completo);
                if (completo && cert) certBtn.href = '/certificado?curso=' + cert;
            }
        });
    }

    // Ejecutar al cargar
    aplicarEstadoCursos();
</script>

</body>
</html>
