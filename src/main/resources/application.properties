# La sesión expira a los 30 minutos de inactividad
server.servlet.session.timeout=30m

# La cookie JSESSIONID se borra al cerrar el navegador (sin max-age persistente)
server.servlet.session.cookie.max-age=-1

# Solo enviar la cookie por HTTP (no accesible desde JS malicioso)
server.servlet.session.cookie.http-only=true

# Evitar que la cookie se envíe en peticiones cross-site
server.servlet.session.cookie.same-site=strict

