# ===============================
# Puerto dinßmico (Railway)
# ===============================
server.port=${PORT:8080}

# ===============================
# Base de datos (MySQL Railway)
# ===============================
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT (Autenticaciˇn)
# ===============================
jwt.secret=${JWT_SECRET:YeRtZt17kL5slYbu_fKrLyJsGOt9cK_zl8sF66trApPJue9Ex07-e3c86tqBHmfPkamkUB8tK0EJBHk-QMVwPw}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===============================
# Seguridad
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# ===============================
# SendGrid (Correo)
# ===============================
SENDGRID_API_KEY=${SENDGRID_API_KEY}

# ===============================
# Configuraciˇn de sesiˇn
# ===============================
server.servlet.session.timeout=30m
server.servlet.session.cookie.max-age=-1
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict
